<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>달력</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.calendar-day {
    width: 14.28%;
    height: 60px;
    border: 1px solid #eee;
    text-align: right;
    padding: 5px;
    font-size: 0.9rem;
}

.sun { color: red; }
.sat { color: blue; }

.holiday {
    color: red;
    font-weight: bold;
    background: #ffecec;
}

.card { display: flex; flex-direction: column; }
.card-body { flex: 1; }

.card-img-top {
    height: 120px;
    object-fit: cover;
}
</style>
</head>

<body class="bg-light">

<div class="container my-4">
<h1 class="text-center">📅 여행 달력</h1>
<div class="accordion" id="calendarAccordion"></div>
</div>

<script>
const years = [2025, 2026, 2027];

const holidays = [/* 위 데이터 그대로 복붙 */];

const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function formatDate(y,m,d){
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function generateCalendar(year, month) {
    let firstDay = new Date(year, month, 1).getDay();
    let lastDate = new Date(year, month + 1, 0).getDate();

    let html = '<div class="d-flex flex-wrap">';

    days.forEach((d,i)=>{
        let cls = i===0?"sun": i===6?"sat":"";
        html += `<div class="calendar-day ${cls}">${d}</div>`;
    });

    for (let i = 0; i < firstDay; i++) {
        html += `<div class="calendar-day"></div>`;
    }

    for (let i = 1; i <= lastDate; i++) {
        let dayOfWeek = new Date(year, month, i).getDay();
        let cls = "";

        if(dayOfWeek === 0) cls += " sun";
        if(dayOfWeek === 6) cls += " sat";

        let fullDate = formatDate(year,month,i);

        if(holidays.includes(fullDate)){
            cls += " holiday";
        }

        html += `<div class="calendar-day ${cls}">${i}</div>`;
    }

    html += '</div>';
    return html;
}

const accordion = document.getElementById("calendarAccordion");

years.forEach((year, idx) => {
    let item = `
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button ${idx!==0?'collapsed':''}" data-bs-toggle="collapse" data-bs-target="#year${year}">
                ${year}년
            </button>
        </h2>
        <div id="year${year}" class="accordion-collapse collapse ${idx===0?'show':''}">
            <div class="accordion-body">
                <div class="row g-3">
    `;

    for (let m = 0; m < 12; m++) {
        let img = `https://picsum.photos/seed/${year}-${m}/400/200`;

        item += `
        <div class="col-md-4 d-flex">
            <div class="card shadow-sm h-100 w-100">
                <img src="${img}" class="card-img-top">
                <div class="card-body">
                    <h5>${m+1}월</h5>
                    ${generateCalendar(year, m)}
                </div>
                <div class="card-footer text-center">
                    <a href="https://www.visitkorea.or.kr" target="_blank" class="btn btn-primary btn-sm">
                        여행가기
                    </a>
                </div>
            </div>
        </div>
        `;
    }

    item += `</div></div></div></div>`;
    accordion.innerHTML += item;
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
