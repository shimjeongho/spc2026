<html>
    <head>

    </head>
    <body>
        <h1>입력폼에 넣을 수 있는 다양한 값</h1>
        <input type="radio" name="과목" value="국어">국어
        <input type="radio" name="과목" value="영어">영어
        <input type="radio" name="과목" value="수학">수학
        <hr>
        <input type="radio" name="음료" value="option1">아메리카
        <input type="radio" name="음료" value="option2">라떼
        <input type="radio" name="음료" value="option3">카푸치노
        <hr>
        <input type="radio" name="음식">김밥
        <input type="radio" name="음식">떡볶이
        <input type="radio" name="음식">라면
        <h2>여러개중 다중선택</h2>
        <input type="checkbox" name="음식">김밥
        <input type="checkbox" name="음식">떡볶이
        <input type="checkbox" name="음식">라면
        <br>
        <input type="checkbox" name="음료" value="option1">아메리카노
        <input type="checkbox" name="음료" value="option1">라떼
        <input type="checkbox" name="음료" value="option1">카푸치노

        <h2>풀다운 메뉴</h2>
        <select size="5">
            <option>사이다</option>
            <option>콜라</option>
            <option>환타</option>
            <option>우유</option>
        </select>

        <select size="5" multiple>
            <option>사이다</option>
            <option>콜라</option>
            <option>환타</option>
            <option>우유</option>
            <option>초코우유</option>
            <option>딸기우유</option>
        </select>

        <h3>프로그래스바</h3>
        <progress value="40" max="100"></progress>40%<br>
        <progress value="60" max="100"></progress>60%<br>
        <progress value="80" max="100"></progress>80%<br>
    </body>
</html>
