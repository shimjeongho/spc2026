<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <style>
        #todo-list li.done {
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <h1>오늘 할일 (Todo 리스트)</h1>
    <input type="text" id="new_todo" placeholder="할일 입력">
    <button id="add_todo" onclick="add()">추가</button>
    <ul id="todo_list"><!-- 할일들이 표시될곳--></ul>
    <script>
        // "1단계: 추가 구현"
        // 1. 버튼이 클릭되면...
        // 2. 거기 값 읽어와서.. ul아래 li 추가하기...

        // 2단계: 완료(done) 구현
        // 1. li를 클릭해서 완료상태 표시 (css로 strike라인 추가)
        // 2. 완료 취소 기능 추가 (위의 반대 - 즉 취소하기

        // 3단계: 삭제 구현
        // 1. 삭제 버튼을 각 항목마다 추가한다
        // 2. 삭제 버튼으로 해당 요소를 삭제한다

        // 4단계: 디자인 적용해보기
        // 1. 체크박스?? 휴지통 아이콘?? 등등
// --------------------------------------------------------------------------------- 내가 한거 (사선 긋는거 까지)
        // const add_todo = document.getElementById('add_todo');
        // const todo_list = document.getElementById('todo_list');
        
        // function add() {
        //     const new_todo = document.getElementById('new_todo').value;
        //     const li = document.createElement("li");

        //     console.log('add 실행')

        //     li.textContent = `${new_todo}`

        //     li.addEventListener('click', () => {
        //         li.classList.toggle("done");
        //     })

        //     todo_list.appendChild(li);
        // }
// ---------------------------------------------------------------------------------- 풀이
        document.getElementById('add-todo').addEventListener('click', () => {
            const newTodo = document.getElementById('new-todo').value;

            if (newTodo.trim() == '') return; // 입력값의 앞뒤 공백 제거 및 입력값이 빈칸이면 종료

            const new_li = document.createElement('li');
            new_li.textContent = newTodo;

            /* 클릭 이벤트를 나의 li에도 걸기 */
            new_li.addEventListener('click', () => {
                // if (new_li.classList.container('done')) {
                //     new_li.classList.remove('done');
                // } else {
                //     new_li.classList.add('done');
                // }
                // 위 5줄을 한줄에
                new_li.classList.toggle('done');
            })

            const todoList = document.getElementById('todo-list');
            todoList.appendChild(new_li);

            // 입력창 클리어 하기
            document.getElementById('new-todo').value = '';
        });

        // 기능개선: 엔터를 통한 버튼 클릭하기 추가
        document.getElementById('new-todo').addEventListener('keydown', (ev) => {
            if(ev.key === 'Enter') {
                document.getElementById('add-todo').click(); // 버튼을 클릭한 액션을 대신 수행
            }
        });
    </script>
</body>
</html>
