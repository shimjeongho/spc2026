<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>이미지 갤러리</h1>
    <div class="gallery">
        <img id="img1" src="images/고양이1.jpeg" width="100px">
        <img id="img2" src="images/고양이2.jpeg" width="100px">
        <img id="img3" src="images/고양이3.jpeg" width="100px">
    </div>

    <!-- 방법2. 리스트 형태 -->
     <img id="large-image" src="">

     <script>
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const img3 = document.getElementById('img3');

        const imgs = [img1, img2, img3];

        imgs.forEach((img) => {
            img.addEventListener('click', () => {
                const large = document.getElementById('large-image');
                large.src = img.src;
                large.width = "400";
            });
        });
     </script>
</body>
</html>
