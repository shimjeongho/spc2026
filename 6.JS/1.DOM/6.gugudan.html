<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단</title>
</head>
<body>
    <h1>구구단 출력기</h1>
    <input type="text" placeholder="단을 입력하시오 (예: 2)" id="input">
    <button onclick="printGugudan()">출력하기</button>

    <div id="result">
        <!-- 결과가 출력될곳 -->
    </div>

    <script>
        function printGugudan() {
            // ===========================
            // 입력값 가져오기
            // ===========================
            // console.log('버튼 클릭 잘 됨')
            const userInput = document.getElementById('input'); // 이건 DOM이 변환된
            const userInputValue = userInput.value; // 해당 DOM 요소가 가지고 있는 값
            
            const userValue = document.getElementById('input').value;// 나중에는 그냥 이렇게 한줄로 하면 됨.
            
            console.log(userInputValue);
            // console.log(userValue);
            
            const userInputValueNumber = parseInt(userInputValue); // 문자열 숫자를 숫자로 바꿈

            // ===========================
            // 입력값 검증하기
            // ===========================
            if (isNaN(userInputValue)) {
                const result =document.getElementById('result');
                result.innerHTML ='<h3>입력은 숫자만 허용합니다.</h3>';
                return;
            }

            if (userInputValue < 1 || userInputValue > 9) {
                const result =document.getElementById('result');
                result.innerHTML ='<h3>입력은 1~9까지만 허용합니다.</h3>';
                return;
            }
            // ===========================
            // 출력값 가져오기
            // ===========================
            const result =document.getElementById('result');
            console.log(result);
            // textContent = 말 그대로 글자 본문을 입력할떄 사용
            // innerHTML은 HTMl값을 파싱할 수 있도록 출력
            result.innerHTML = '<h3>' + userInputValue + '단</h3>'

            for (let i = 1; i <=9; i++) {
                // result.innerHTML += userInputValue + ' x ' + i + ' = ' + userInputValue * i + '<BR>'
                    result.innerHTML += `${userInputValue} x ${i} = ${userInputValue * i}<BR>`;
            }
        }
    </script>
</body>
</html>
