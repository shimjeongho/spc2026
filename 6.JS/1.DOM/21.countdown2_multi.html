<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>카운트다운</h1>
    <input type="number" id="timeInput" placeholder="초를 입력하세요" min="1">
    <button onclick="startTimer()" id="startButton">시작</button>
    <div id="timerContainer"></div>
    <div>
       <p id="timerDisplay"> <!-- 카운트 다운을 출력할 곳  --></p>
    </div>

    <script>
        function startTimer() {
            // 1. 입력값 가져온다.
            // 2. setInterval()을 통해서.. 매초 카운트 다운을 한다.
            // 3. 남은 초를 DOM에다가 (p태그) 에다가 출력한다.
            // 4. 시간이 만료했으면, 끝났다고 출력한다. 
            let inputValue = parseInt(document.getElementById('timeInput').value);
            const timerContainer = document.getElementById('timerContainer');
            const startButton = document.getElementById('startButton');

            // 원하는 새로운 DOM요소 만들기
            const timerP = document.createElement('p');
            timerP.textContent = `${inputValue}초가 남았습니다`;
        
            // 새로 만든 요소를 원하는 div에다가 추가하기
            timerContainer.appendChild(timerP);

            const timerId = setInterval(() => {
                // 0까지 초가 - 되지 않게 <= 0
                if (inputValue <= 0) {
                    clearInterval(timerId);
                    timerP.textContent = '시간이 종료되었습니다.';
                } else {
                    timerP.textContent = `${inputValue}초가 남았습니다`;
                    inputValue--;
                }
            }, 1000);
        }
    </script>
</body>
</html>
