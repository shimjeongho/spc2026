<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }
        td {
            padding: 10px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>셀 1</td>
            <td>셀 2</td>
            <td>셀 3</td>
        </tr>
        <tr>
            <td>셀 4</td>
            <td>셀 5</td>
            <td>셀 6</td>
        </tr>
        <tr>
            <td>셀 7</td>
            <td>셀 8</td>
            <td>셀 9</td>
        </tr>
    </table>

    <button onclick="changeOddCells()">홀수 셀 색상 변경</button>
    <button onclick="changeEvenCells()">짝수 셀 색상 변경</button>

    <script>
        function changeOddCells() {
            const cells = document.getElementsByTagName('td');
            for (let i = 0; i < cells.length; i++) {
                if (i % 2 == 0) {
                    console.log(cells[i]);
                    cells[i].style.backgroundColor = "lightgreen"
                }
            }
        }
        
        function changeEvenCells() {
            const cells = document.getElementsByTagName('td');
            // cells 가 HTMLCollections 라서 일반 Array로 변환하기 : Array.from(리스트타입)
            Array.from(cells).forEach((cell, index) => {
                if (index % 2 == 1) {
                    cell.style.backgroundColor = 'lightblue';
                    // console.log(index, cell);
                }
            });
        }
    </script>
</body>
</html>
