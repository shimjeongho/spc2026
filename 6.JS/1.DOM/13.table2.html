<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #table2 td {
            background-color: pink;
        }
        table {
            border-collapse: collapse;
        }
        td {
            padding: 10px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table id="table1">
        <tr>
            <td>셀 1</td>
            <td>셀 2</td>
            <td>셀 3</td>
        </tr>
        <tr>
            <td>셀 4</td>
            <td>셀 5</td>
            <td>셀 6</td>
        </tr>
        <tr>
            <td>셀 7</td>
            <td>셀 8</td>
            <td>셀 9</td>
        </tr>
    </table>
    <hr>
    <table id="table2">
        <tr>
            <td>셀 1</td>
            <td>셀 2</td>
        </tr>
        <tr>
            <td>셀 3</td>
            <td>셀 4</td>
        </tr>
    </table>

    <button onclick="changeOddCells()">홀수 셀 색상 변경</button>
    <button onclick="changeEvenCells()">짝수 셀 색상 변경</button>

    <script>
        function changeOddCells() {
            const table1 = document.getElementById('table1');
            const cells = table1.getElementsByTagName('td');
            for (let i = 0; i < cells.length; i++) {
                if (i % 2 == 0) {
                    console.log(cells[i]);
                    cells[i].style.backgroundColor = "lightgreen"
                }
            }
        }
        
        function changeEvenCells() {
            // const table2 = document.getElementById('table2');
            // const cells = table2.getElementsByTagName('td');
            const cells = document.querySelectorAll('#table2 td')
            console.log(cells);
            cells.forEach((cell, index) => {
                if (index % 2 == 1) {
                    cell.style.backgroundColor = 'lightblue';
                }
            });
        }
    </script>
</body>
</html>
