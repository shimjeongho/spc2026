<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #sizeInfo {
            font-size: 18px;
            line-height: 1.5;
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>당신의 화면 정보는 다음과 같습니다.</h1>
    <div id="sizeInfo"></div>
    <script>
        function updatewindowInfo() {

            const width = window.innerWidth;
            const heigth = window.innerHeight;
            
            const outerwidth = window.outerWidth; 
            const outerheight = window.outerHeight;
            
            const screenwidth = screen.width;  // 모니터의 해상도
            const screenheight = screen.height;

            const sizeInfo = document.getElementById('sizeInfo');
            sizeInfo.innerHTML = `
                <strong>뷰포트(viewport) = window.inner</strong><br>
                width: ${innerWidth} px <br>
                Height: ${innerHeight} px <br><br>
                <strong>브라우저 크기 = window.outer</strong><br>
                width: ${outerWidth} px <br>
                Height: ${outerHeight} px <br><br>
                <strong>화면 해상도</strong><br>
                width: ${screenwidth} px <br>
                Height: ${screenheight} px 
            `;

        }

        window.addEventListener('load', () => { // 타이머 이슈(타이밍 버그)
            setTimeout(updatewindowInfo, 50); // 50ms 딜레이를 통해서 브라우저의 렌더러기
        })

        //  updatewindowInfo(); // 화면 최초 로딩시에 표시하기 위해서 1회 수동 호출

        window.addEventListener('resize', updatewindowInfo);
    </script>
</body>
</html>
