<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id="aniCanvas" width="400" height="200"></canvas>
    <script>
        const canvas = document.getElementById('aniCanvas');
        const context = canvas.getContext('2d');

        const graphDate = {
            A: 10,
            B: 20,
            C: 40,
            D: 60,
            E: 100
        }
        let startX = 50;
        const barHeightOffset = 20;

        drawBarGrapgh(graphDate);

        function drawBarGrapgh(data) {
            const barWidth = 30;
            
            for (const key in data) {
                const barHeight = data[key];
                context.fillStyle = 'blue';
                context.fillRect(startX, canvas.height - barHeight - barHeightOffset, barWidth, barHeight);

                context.fillStyle = 'black';
                context.fillText(key, startX + barWidth / 2, canvas.height - 10);
                startX += 50;
            }
        }
    </script>
</body>
</html>
