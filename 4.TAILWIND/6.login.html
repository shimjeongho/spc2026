<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Login</title>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <!-- wrapper (그림자용) -->
  <div class="relative w-[90%] md:w-[50%] lg:w-[35%]">

    <!-- 그림자 (뒤쪽) -->
    <div class="absolute inset-0 rounded-2xl 
                bg-black/80 
                translate-x-4 translate-y-4 
                blur-2xl z-0">
    </div>

    <!-- 실제 카드 -->
    <div class="relative bg-white rounded-2xl p-8 z-10 shadow-none">

      <h2 class="text-3xl font-bold mb-6 text-center">Login</h2>

      <form class="space-y-5">
        
        <div>
          <label class="block mb-1 font-semibold">Username</label>
          <input type="text"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block mb-1 font-semibold">Password</label>
          <input type="password"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button type="submit"
          class="w-full bg-blue-500 hover:bg-purple-600 text-white font-semibold py-2 rounded-lg transition-all duration-300">
          로그인
        </button>

      </form>

    </div>

  </div>

</body>
</html>
