<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자리배치</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d8dde8;
      --seat: #efe2b8;
      --text: #1f2937;
      --muted: #667085;
      --accent: #2563eb;
      --teacher: #cfe0ff;
      --empty: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fbff 0%, #f3f6fb 100%);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15,23,42,.05);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #e7efff; color: #1d4ed8; }
    .ghost { background: #eef2f7; color: #334155; }
    .danger-lite { background: #fff1f2; color: #be123c; }

    .layout {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(15,23,42,.06);
      overflow-x: auto;
    }

    .rear {
      text-align: center;
      font-weight: 900;
      font-size: 22px;
      margin-bottom: 12px;
    }

    .stage {
      display: inline-flex;
      flex-direction: column;
      min-width: 1120px;
      width: 100%;
      gap: 22px;
    }

    .zones {
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr;
      gap: 34px;
      align-items: start;
    }

    .zone {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .zone-title {
      min-height: 24px;
      text-align: center;
      color: #374151;
      font-weight: 800;
    }

    .grid {
      display: grid;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background-image:
        linear-gradient(to right, var(--line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--line) 1px, transparent 1px);
      background-size: 100% 100%;
    }

    .grid.two { grid-template-columns: repeat(2, 1fr); }
    .grid.three { grid-template-columns: repeat(3, 1fr); }

    .cell {
      min-width: 120px;
      min-height: 58px;
      background: #fff;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .seat {
      background: var(--seat);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .seat:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 2px rgba(37,99,235,.15);
    }

    .seat.selected {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }

    .empty { background: var(--empty); }

    .seat-num {
      position: absolute;
      top: 5px;
      left: 6px;
      font-size: 11px;
      font-weight: 900;
      color: #475467;
      background: rgba(255,255,255,.8);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 999px;
      padding: 2px 6px;
    }

    .seat-name {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
    }

    .teacher-row {
      display: flex;
      justify-content: center;
    }

    .teacher {
      width: 170px;
      text-align: center;
      padding: 14px;
      border-radius: 14px;
      background: var(--teacher);
      border: 1px solid #9bbcff;
      font-weight: 900;
    }

    .front {
      text-align: center;
      font-weight: 900;
      font-size: 22px;
      margin-top: 4px;
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
      font-size: 14px;
      color: #334155;
    }

    .manual-panel,
    .name-list {
      margin-top: 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .manual-panel h2,
    .name-list strong {
      margin: 0 0 8px;
    }

    .manual-panel p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .manual-row,
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    select {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      min-width: 210px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend span {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid var(--line);
      display: inline-block;
    }

    @media (max-width: 900px) {
      .zones {
        grid-template-columns: 1fr;
      }

      .stage {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>자리배치</h1>
        <div class="sub">
          원래 자리 구조로 복원했습니다.<br>
          랜덤 셔플, 좌석 클릭 교체, 좌석 번호 표시가 모두 유지됩니다.
        </div>
      </div>

      <div class="controls">
        <button class="primary" id="shuffleBtn">랜덤 셔플</button>
        <button class="secondary" id="resetBtn">초기화</button>
        <button class="ghost" id="copyBtn">복사</button>
        <button class="danger-lite" id="clearSelectBtn">선택 해제</button>
      </div>
    </div>

    <div class="layout">
      <div class="rear">뒤쪽 유리창</div>

      <div class="stage">
        <div class="zones">
          <section class="zone">
            <div class="zone-title"></div>
            <div class="grid two" id="leftGrid"></div>
          </section>

          <section class="zone">
            <div class="zone-title"></div>
            <div class="grid three" id="middleGrid"></div>
          </section>

          <section class="zone">
            <div class="zone-title"></div>
            <div class="grid two" id="rightGrid"></div>
          </section>
        </div>

        <div class="teacher-row">
          <div class="teacher">강사</div>
        </div>

        <div class="front">앞쪽 스크린</div>
      </div>

      <div class="legend">
        <span><i class="dot" style="background:#efe2b8"></i> 배치 가능한 좌석</span>
        <span><i class="dot" style="background:#f8fafc"></i> 빈자리</span>
      </div>

      <div class="status" id="statusBox">좌석 두 개를 차례로 누르면 자리가 서로 바뀝니다.</div>

      <div class="manual-panel">
        <h2>직접 지정 배치</h2>
        <p>멤버와 좌석 번호를 선택하면 해당 자리로 보낼 수 있습니다. 이미 누가 있으면 서로 교체됩니다.</p>
        <div class="manual-row">
          <select id="nameSelect"></select>
          <select id="seatSelect"></select>
          <button class="secondary" id="assignBtn">이 자리로 보내기</button>
        </div>
      </div>

      <div class="name-list">
        <strong>현재 멤버 목록</strong>
        <div class="chips" id="nameChips"></div>
      </div>
    </div>
  </div>

  <script>
    const originalNames = [
      "조운", "조은결",
      "권태현", "김성호", "한혜정", "유지산",
      "이춘우", "최준호", "이서우",
      "김민정", "박지우", "박은빈",
      "진미경", "박상우", "조용민",
      "김민정", "이종혁", "김유선",
      "심정호", "이태경",
      "황동건", "이상욱",
      "원가희", "신혜진",
      "김선희", "한은테",
      "박초롱", "박준하",
      "채란", "이민지"
    ];

    const sections = {
      left: {
        el: document.getElementById("leftGrid"),
        label: "왼쪽 구역",
        cells: [
          { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" },
          { type: "empty" }, { type: "seat" },
          { type: "empty" }, { type: "seat" }
        ]
      },
      middle: {
        el: document.getElementById("middleGrid"),
        label: "가운데 구역",
        cells: [
          { type: "seat" }, { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" }, { type: "seat" },
          { type: "empty" }, { type: "seat" }, { type: "seat" }
        ]
      },
      right: {
        el: document.getElementById("rightGrid"),
        label: "오른쪽 구역",
        cells: [
          { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" },
          { type: "seat" }, { type: "seat" }
        ]
      }
    };

    const seatMap = [];
    let currentNames = [...originalNames];
    let selectedSeatIndex = null;

    function setStatus(text) {
      document.getElementById("statusBox").textContent = text;
    }

    function renderNameChips(names) {
      const chips = document.getElementById("nameChips");
      chips.innerHTML = "";
      names.forEach((name, idx) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = `${idx + 1}. ${name}`;
        chips.appendChild(chip);
      });
    }

    function rebuildSelectOptions() {
      const nameSelect = document.getElementById("nameSelect");
      const seatSelect = document.getElementById("seatSelect");

      nameSelect.innerHTML = "";
      currentNames.forEach((name, idx) => {
        const option = document.createElement("option");
        option.value = idx;
        option.textContent = `${name} (${idx + 1}번 멤버)`;
        nameSelect.appendChild(option);
      });

      seatSelect.innerHTML = "";
      seatMap.forEach((meta, idx) => {
        const option = document.createElement("option");
        option.value = idx;
        option.textContent = `좌석 ${idx + 1} - ${meta.sectionLabel} ${meta.localSeatNo}`;
        seatSelect.appendChild(option);
      });
    }

    function clearSelection() {
      selectedSeatIndex = null;
      seatMap.forEach(meta => meta.element.classList.remove("selected"));
      setStatus("좌석 두 개를 차례로 누르면 자리가 서로 바뀝니다.");
    }

    function swapSeats(a, b) {
      [currentNames[a], currentNames[b]] = [currentNames[b], currentNames[a]];
      placeNames(currentNames);
      renderNameChips(currentNames);
      rebuildSelectOptions();
    }

    function handleSeatClick(index) {
      if (selectedSeatIndex === null) {
        selectedSeatIndex = index;
        seatMap[index].element.classList.add("selected");
        setStatus(`첫 좌석 선택: 좌석 ${index + 1} / ${currentNames[index]}`);
        return;
      }

      if (selectedSeatIndex === index) {
        clearSelection();
        return;
      }

      const from = selectedSeatIndex;
      const to = index;

      swapSeats(from, to);
      clearSelection();
      setStatus(`자리 교체 완료: 좌석 ${from + 1} ↔ 좌석 ${to + 1}`);
    }

    function buildGrid(sectionKey) {
      const section = sections[sectionKey];
      section.el.innerHTML = "";
      let localSeatNo = 0;

      section.cells.forEach(cellData => {
        const cell = document.createElement("div");
        cell.className = `cell ${cellData.type}`;

        if (cellData.type === "seat") {
          localSeatNo += 1;
          const globalIndex = seatMap.length;

          const num = document.createElement("div");
          num.className = "seat-num";
          num.textContent = `#${globalIndex + 1}`;
          cell.appendChild(num);

          const name = document.createElement("div");
          name.className = "seat-name";
          cell.appendChild(name);

          cell.title = `좌석 ${globalIndex + 1}`;
          cell.addEventListener("click", () => handleSeatClick(globalIndex));

          seatMap.push({
            sectionKey,
            sectionLabel: section.label,
            localSeatNo: `${localSeatNo}번`,
            element: cell,
            nameElement: name
          });
        } else {
          cell.innerHTML = '<div class="seat-name" style="font-size:14px;color:#98a2b3;font-weight:700;">빈자리</div>';
        }

        section.el.appendChild(cell);
      });
    }

    function placeNames(names) {
      seatMap.forEach((meta, idx) => {
        meta.nameElement.textContent = names[idx] || "";
      });
    }

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function getCurrentLayoutText() {
      const lines = ["[자리배치 결과]"];
      seatMap.forEach((meta, idx) => {
        lines.push(`좌석 ${idx + 1} (${meta.sectionLabel} ${meta.localSeatNo}): ${currentNames[idx]}`);
      });
      lines.push("빈자리: 가운데 구역 마지막 줄 왼쪽 1칸");
      return lines.join("\n");
    }

    buildGrid("left");
    buildGrid("middle");
    buildGrid("right");
    placeNames(currentNames);
    renderNameChips(currentNames);
    rebuildSelectOptions();

    document.getElementById("shuffleBtn").addEventListener("click", () => {
      currentNames = shuffle(currentNames);
      placeNames(currentNames);
      renderNameChips(currentNames);
      rebuildSelectOptions();
      clearSelection();
      setStatus("랜덤 셔플이 완료됐습니다.");
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      currentNames = [...originalNames];
      placeNames(currentNames);
      renderNameChips(currentNames);
      rebuildSelectOptions();
      clearSelection();
      setStatus("원래 배치로 되돌렸습니다.");
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(getCurrentLayoutText());
        setStatus("현재 배치를 복사했어요.");
      } catch (e) {
        setStatus("복사에 실패했어요. 브라우저 권한을 확인해주세요.");
      }
    });

    document.getElementById("clearSelectBtn").addEventListener("click", clearSelection);

    document.getElementById("assignBtn").addEventListener("click", () => {
      const nameIndex = Number(document.getElementById("nameSelect").value);
      const seatIndex = Number(document.getElementById("seatSelect").value);

      if (Number.isNaN(nameIndex) || Number.isNaN(seatIndex)) return;

      if (nameIndex === seatIndex) {
        setStatus("이미 그 자리에 앉아 있습니다.");
        return;
      }

      const movingName = currentNames[nameIndex];
      swapSeats(nameIndex, seatIndex);
      setStatus(`${movingName} → 좌석 ${seatIndex + 1} 이동 완료`);
    });
  </script>
</body>
</html>
